<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Viewer Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>

        body {
            margin: 0;
            padding: 0;
            background-color: black;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: 5px solid;
            border-radius: 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rainbow-animation 5s linear infinite;
        }

        @keyframes rainbow-animation {
            0% { border-color: red; }
            14% { border-color: orange; }
            28% { border-color: yellow; }
            42% { border-color: green; }
            57% { border-color: blue; }
            71% { border-color: indigo; }
            85% { border-color: violet; }
            100% { border-color: red; }
        }

        @keyframes rainbow-button-animation {
            0% { background-color: red; }
            14% { background-color: orange; }
            28% { background-color: yellow; }
            42% { background-color: green; }
            57% { background-color: blue; }
            71% { background-color: indigo; }
            85% { background-color: violet; }
            100% { background-color: red; }
        }

        #pc-content {
            display: none;
            text-align: center;
        }

        .button {
            background-color: blue;
            color: white;
            border: none;
            padding: 25px 40px;
            margin: 20px 0;
            cursor: pointer;
            font-size: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, opacity 0.3s;
            opacity: 1;
        }

        .button:hover {
            animation: rainbow-button-animation 5s linear infinite;
            color: black;
            opacity: 0.9;
        }

        #mobile-content {
            display: none;
            text-align: center;
        }

        @media only screen and (max-width: 768px) {
            #mobile-content {
                display: block;
            }

            #pc-content {
                display: none;
            }
        }

        @media only screen and (min-width: 769px) {
            #mobile-content {
                display: none;
            }

            #pc-content {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div id="pc-content">
            <button class="button" id="releasesButton" onclick="window.location.href='https://github.com/EuroSzymon/ModelViewerTest/releases'">
                View Releases Tab
            </button>
            <button class="button" id="mobileVersionButton" onclick="window.location.href='https://euroszymon.github.io/ModelViewerTest'">
                Switch to Mobile Version
            </button>
        </div>

    <script>
        const container = document.getElementById('container');
        const buttons = document.querySelectorAll('.button');

        let isRainbow = true;
        container.addEventListener('click', () => {
            if (isRainbow) {
                container.style.animation = 'none'; 
                container.style.borderColor = 'grey'; 
                buttons.forEach(button => {
                    button.style.backgroundColor = 'blue'; 
                    button.disabled = true;
                });
            } else {
                container.style.animation = 'rainbow-animation 5s linear infinite';
                container.style.borderColor = '';
                buttons.forEach(button => {
                    button.style.backgroundColor = '';
                    button.disabled = false;
                });
            }
            isRainbow = !isRainbow;
        });
    </script>
</body>
</html>
