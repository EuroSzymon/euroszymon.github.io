<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Model Viewer Test</title>
    <style>
        .noscript-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: red;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            visibility: hidden;
        }
        noscript .noscript-overlay {
            visibility: visible;
        }
    </style>
</head>
<body>
    <div class="noscript-overlay">
        JavaScript is disabled in your browser. Please enable JavaScript to use this website.
    </div>

    <div id="container" class="container"></div>

    <div style="position: relative;">
        <div class="text-label copyfail" id="book-label">View Releases Tab</div>
        <svg class="icon book-icon locked" id="book-icon" viewBox="0 0 100 100">
            <rect x="10" y="10" width="80" height="60" fill="white" stroke="black" stroke-width="2" />
            <rect x="20" y="20" width="60" height="4" fill="lightgray" />
            <rect x="20" y="30" width="60" height="4" fill="lightgray" />
            <rect x="20" y="40" width="60" height="4" fill="lightgray" />
            <rect x="20" y="50" width="60" height="4" fill="lightgray" />
            <rect x="20" y="60" width="60" height="4" fill="lightgray" />
        </svg>
        <svg class="checkmark" id="book-checkmark" viewBox="0 0 24 24">
            <path d="M9 16.2l-3.5-3.5L4 14l5 5 10-10-1.5-1.5L9 16.2z"/>
        </svg>
    </div>

    <div style="position: relative;">
        <div class="text-label copyfail" id="phone-label">Switch to Mobile Version</div>
        <svg class="icon phone-icon locked" id="phone-icon" viewBox="0 0 24 24">
            <path d="M7.01 2h9.99C18.11 2 19 2.9 19 3.99v16.02c0 1.09-.89 1.99-1.99 1.99H7.01C5.91 22 5 21.1 5 20.01V3.99C5 2.9 5.9 2 7.01 2zm9.99 2H7.01v16.02h9.99V4z"/>
        </svg>
        <svg class="checkmark" id="phone-checkmark" viewBox="0 0 24 24">
            <path d="M9 16.2l-3.5-3.5L4 14l5 5 10-10-1.5-1.5L9 16.2z"/>
        </svg>
    </div>

    <div id="switcher-checkmark" class="switcher-checkmark">
        <div class="toggle-circle">
            <svg id="mode-icon" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="5" fill="#FFD700" />
                <line x1="12" y1="0" x2="12" y2="4" stroke="#FFD700" stroke-width="2"/>
                <line x1="12" y1="20" x2="12" y2="24" stroke="#FFD700" stroke-width="2"/>
                <line x1="0" y1="12" x2="4" y2="12" stroke="#FFD700" stroke-width="2"/>
                <line x1="20" y1="12" x2="24" y2="12" stroke="#FFD700" stroke-width="2"/>
                <line x1="3.54" y1="3.54" x2="5.88" y2="5.88" stroke="#FFD700" stroke-width="2"/>
                <line x1="18.12" y1="18.12" x2="20.46" y2="20.46" stroke="#FFD700" stroke-width="2"/>
                <line x1="3.54" y1="20.46" x2="5.88" y2="18.12" stroke="#FFD700" stroke-width="2"/>
                <line x1="18.12" y1="5.88" x2="20.46" y2="3.54" stroke="#FFD700" stroke-width="2"/>
            </svg>
        </div>
    </div>
    
    <noscript>
        <div class="noscript-overlay">
            JavaScript is disabled in your browser. Please enable JavaScript to use this website.
        </div>
    </noscript>
    
    <script src="modelviewertest.js"></script>
    <script src="mobile.js"></script>
</body>
</html>
