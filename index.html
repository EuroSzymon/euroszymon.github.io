<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <title>Model Viewer Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            gap: 30px;
        }

        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .object {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: grab;
            background-color: gray;
        }

        .icon-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }


        .icon-container > div {
            padding: 10px;
        }

        .icon {
            width: 60px;
            height: 60px;
            cursor: default;
        }

        .checkmark {
            width: 60px;
            height: 60px;
            position: absolute;
            fill: transparent;
            z-index: -1;
        }

        .book-icon {
            fill: white;
        }

        .phone-icon {
            fill: white;
        }

        .icon.locked {
            opacity: 0.5;
        }

        .icon.unlocked {
            cursor: pointer;
        }

        .icon-container .text-label {
            position: absolute;
            top: -35px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        .copyfail {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
    </style>
</head>
<body>
<div id="container" class="container"></div>

<div style="position: relative;">
    <div class="text-label copyfail" id="book-label">View Releases Tab</div>
    <svg class="icon book-icon locked" id="book-icon" viewBox="0 0 100 100">
        <rect x="10" y="10" width="80" height="60" fill="white" stroke="black" stroke-width="2" />
        <rect x="20" y="20" width="60" height="4" fill="lightgray" />
        <rect x="20" y="30" width="60" height="4" fill="lightgray" />
        <rect x="20" y="40" width="60" height="4" fill="lightgray" />
        <rect x="20" y="50" width="60" height="4" fill="lightgray" />
        <rect x="20" y="60" width="60" height="4" fill="lightgray" />
    </svg>
    <svg class="checkmark" id="book-checkmark" viewBox="0 0 24 24">
        <path d="M9 16.2l-3.5-3.5L4 14l5 5 10-10-1.5-1.5L9 16.2z" />
    </svg>
</div>

<div style="position: relative;">
    <div class="text-label copyfail" id="phone-label">Switch to Mobile Version</div>
    <svg class="icon phone-icon locked" id="phone-icon" viewBox="0 0 24 24">
        <path
            d="M7.01 2h9.99C18.11 2 19 2.9 19 3.99v16.02c0 1.09-.89 1.99-1.99 1.99H7.01C5.91 22 5 21.1 5 20.01V3.99C5 2.9 5.9 2 7.01 2zm9.99 2H7.01v16.02h9.99V4z" />
    </svg>
    <svg class="checkmark" id="phone-checkmark" viewBox="0 0 24 24">
        <path d="M9 16.2l-3.5-3.5L4 14l5 5 10-10-1.5-1.5L9 16.2z" />
    </svg>
</div>
</body>

<script>
    const container = document.getElementById('container');
    const maxObjects = 3;
    let objects = [null, null, null];
    let unlockedUrl = null;

    const predefinedColors = [
        '#FF5733',
        '#33FF57',
        '#3357FF',
        '#FF33A8',
        '#F9FF33',
        '#33FFF7',
        '#FF0300',
        '#129CFF',
        '#C012FF',
        '#C8FF12',
        '#0000FF'
    ];
    const usedColors = [];

    document.addEventListener('contextmenu', (event) => {
        event.preventDefault();
    });

    document.addEventListener('DOMContentLoaded', () => {
        const checkmarks = [
            document.getElementById('book-checkmark'),
            document.getElementById('phone-checkmark')
        ];

        checkmarks.forEach((checkmark, index) => {
            const color = coloralgorithm();
            checkmark.style.fill = color;

            const label = index === 0 ? document.getElementById('book-label') : document.getElementById('phone-label');
            label.style.color = color;
        });
    });

    function coloralgorithm() {
        if (usedColors.length >= predefinedColors.length) {
            usedColors.length = 0;
        }

        let randomColor;
        do {
            const randomIndex = Math.floor(Math.random() * predefinedColors.length);
            randomColor = predefinedColors[randomIndex];
        } while (usedColors.includes(randomColor));

        usedColors.push(randomColor);
        return randomColor;
    }

    document.addEventListener('keydown', (event) => {
        if (unlockedUrl) return;

        const validKeys = ['1', '2', '3'];
        if (validKeys.includes(event.key)) {
            const objectIndex = parseInt(event.key) - 1;

            if (!objects[objectIndex]) {
                const randomX = Math.random() * (window.innerWidth - 70);
                const randomY = Math.random() * (window.innerHeight - 70);
                sharedspawn(randomX, randomY, objectIndex);
            } else {
                sharedespawn(objectIndex);
            }
        }
    });

    function check_buttonunlock(index) {
        const checkmarkColors = [
            document.getElementById('book-checkmark').style.fill,
            document.getElementById('phone-checkmark').style.fill
        ];

        const objectColor = objects[index] ? objects[index].style.backgroundColor : null;
        if (objectColor === checkmarkColors[0]) {
            buttonunlock('https://github.com/EuroSzymon/ModelViewerTest/releases', 'book');
        } else if (objectColor === checkmarkColors[1]) {
            buttonunlock('https://euroszymon.github.io/ModelViewerTest/', 'phone');
        }
    }

    function buttonunlock(url, iconType) {
        if (unlockedUrl) return;

        const icon = iconType === 'book' ? document.getElementById('book-icon') : document.getElementById('phone-icon');
        icon.classList.remove('locked');
        icon.classList.add('unlocked');
        icon.style.cursor = 'pointer';

        icon.addEventListener('click', () => window.location.href = url);

        unlockedUrl = url;
    }

    let isDragging = false;
    let offsetX = 0;
    let offsetY = 0;
    let currentDraggedIndex = null;

    function sharedspawn(x, y, index) {
        const newObject = document.createElement('div');
        newObject.className = 'object';
        newObject.style.backgroundColor = coloralgorithm();
        newObject.style.left = `${x}px`;
        newObject.style.top = `${y}px`;

        newObject.addEventListener('mousedown', (event) => pc_startdrag(event, newObject, index));
        newObject.addEventListener('click', () => pc_stopdrag(index));

        container.appendChild(newObject);
        objects[index] = newObject;
    }

    function smartphone_startdrag(event, object, index) {
        isDragging = true;
        currentDraggedIndex = index;

        const touch = event.touches ? event.touches[0] : event;
        offsetX = touch.clientX - object.offsetLeft;
        offsetY = touch.clientY - object.offsetTop;

        document.addEventListener('touchmove', (e) => smartphone_ondrag(e, object), { passive: false });
        document.addEventListener('touchend', stopDrag);
    }

    function smartphone_ondrag(event, object) {
        if (!isDragging) return;

        const touch = event.touches[0];
        object.style.left = `${touch.clientX - offsetX}px`;
        object.style.top = `${touch.clientY - offsetY}px`;
    }

    function smartphone_stopdrag() {
        if (!isDragging) return;

        isDragging = false;
        document.removeEventListener('touchmove', onDrag);
        document.removeEventListener('touchend', stopDrag);
    }

    function smartphone() {
        document.body.addEventListener('touchstart', (event) => {
            const touch = event.touches[0];
            const objectIndex = objects.findIndex(obj => obj === null);
            if (objectIndex !== -1) {
                sharedspawn(touch.clientX, touch.clientY, objectIndex);
            }
        });
    }

    function PC() {
        document.body.addEventListener('click', (event) => {
            if (event.target === document.body) {
                const objectIndex = objects.findIndex(obj => obj === null);
                if (objectIndex !== -1) {
                    const randomX = event.clientX;
                    const randomY = event.clientY;
                    sharedspawn(randomX, randomY, objectIndex);
                }
            }
        });
    }

    const phonelogic = /Mobi|Android/i.test(navigator.userAgent);

    if (phonelogic) {
        smartphone();
    } else {
        PC();
    }

    if (/Mobi|Android/i.test(navigator.userAgent)) {
        window.location.href = 'https://euroszymon.github.io/ModelViewerTest/';
    }

    function pc_ondrag(event) {
        if (!isDragging) return;

        const object = objects[currentDraggedIndex];
        object.style.left = `${event.clientX - offsetX}px`;
        object.style.top = `${event.clientY - offsetY}px`;

        buttoncollision(object);
    }

    function pc_stopdrag() {
        if (!isDragging) return;

        isDragging = false;
        document.removeEventListener('mousemove', pc_ondrag);
        document.removeEventListener('mouseup', pc_stopdrag);

        check_buttonunlock(currentDraggedIndex);
    }

    function pc_startdrag(event, object, index) {
        isDragging = true;
        currentDraggedIndex = index;
        offsetX = event.clientX - object.offsetLeft;
        offsetY = event.clientY - object.offsetTop;

        document.addEventListener('mousemove', pc_ondrag);
        document.addEventListener('mouseup', pc_stopdrag);
    }

    function pcspawn(x, y, index) {
        const newObject = document.createElement('div');
        newObject.className = 'object';
        newObject.style.backgroundColor = coloralgorithm();
        newObject.style.left = `${x}px`;
        newObject.style.top = `${y}px`;

        newObject.addEventListener('mousedown', (event) => pc_startdrag(event, newObject, index));

        container.appendChild(newObject);
        objects[index] = newObject;
    }

    function sharedespawn(index) {
        if (objects[index]) {
            container.removeChild(objects[index]);
            objects[index] = null;
        }
    }

    function buttoncollision(object) {
        const icons = [
            {
                icon: document.getElementById('book-icon'),
                checkmarkColor: document.getElementById('book-checkmark').style.fill
            },
            {
                icon: document.getElementById('phone-icon'),
                checkmarkColor: document.getElementById('phone-checkmark').style.fill
            }
        ];

        icons.forEach(({ icon, checkmarkColor }) => {
            const iconRect = icon.getBoundingClientRect();
            const objectRect = object.getBoundingClientRect();
            const objectColor = object.style.backgroundColor;

            if (
                objectRect.left < iconRect.right &&
                objectRect.right > iconRect.left &&
                objectRect.top < iconRect.bottom &&
                objectRect.bottom > iconRect.top
            ) {
                if (objectColor === checkmarkColor) {
                    icon.classList.remove('locked');
                    icon.classList.add('unlocked');
                }
            } else {
                icon.classList.add('locked');
                icon.classList.remove('unlocked');
            }
        });
    }
</script>
</body>
</html>
